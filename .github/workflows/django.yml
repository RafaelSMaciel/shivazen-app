name: Django CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
    - name: Install flake8
      run: pip install flake8
    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warnings (line length 120, complexity 10)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --exclude=migrations,__pycache__,.git

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Django System Checks
      env:
        DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        DEBUG: "True"
      run: python manage.py check

    - name: Check for missing migrations
      env:
        DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        DEBUG: "True"
      run: python manage.py makemigrations --check --dry-run

    - name: Run Tests
      env:
        DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        DEBUG: "True"
        CELERY_BROKER_URL: redis://localhost:6379/0
        CELERY_RESULT_BACKEND: redis://localhost:6379/0
      run: python manage.py test --verbosity=2
