name: CI

# Pausado: so roda manualmente via GitHub Actions UI (workflow_dispatch).
# Para reativar em push/PR, descomentar o bloco abaixo.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'app_shivazen/**'
  #     - 'shivazen/**'
  #     - 'requirements.txt'
  #     - '.github/workflows/ci.yml'
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'app_shivazen/**'
  #     - 'shivazen/**'
  #     - 'requirements.txt'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  DJANGO_SECRET_KEY: ci-test-secret-key-32-chars-minimum
  DEBUG: 'False'
  ALLOWED_HOSTS: '*'
  DJANGO_ENV: 'dev'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff==0.7.0
      - name: Lint
        run: ruff check app_shivazen shivazen
      - name: Format check
        run: ruff format --check app_shivazen shivazen

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install coverage pytest pytest-django pytest-cov
      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run
      - name: Tests + coverage
        run: |
          coverage run --source=app_shivazen manage.py test app_shivazen --verbosity=2
          coverage report --fail-under=60
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  security:
    runs-on: ubuntu-latest
    needs: lint
    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-32-chars-long-enough-x
      ALLOWED_HOSTS: 'example.com'
      DJANGO_ENV: 'prod'
      USE_HTTPS: 'False'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Django deploy check
        run: python manage.py check --deploy --fail-level WARNING || true
      - name: Detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
