[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    "*/migrations/*",
    ".venv",
    "venv",
    "staticfiles",
    "media",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "DJ",  # flake8-django
    "S",   # flake8-bandit (security)
    "T20", # flake8-print
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "S101",   # assert (used in tests)
    "S105",   # hardcoded password (false positives in fixtures)
    "S106",   # hardcoded password func arg (test fixtures)
    "S311",   # random not crypto (we use secrets where it matters)
    "DJ001",  # null=True on string fields (sometimes needed)
    "B008",   # function call in default arg (Django pattern)
]

[tool.ruff.lint.per-file-ignores]
"app_shivazen/tests/*" = ["S", "T20"]
"shivazen/settings/*" = ["F401", "F403", "F405"]
"manage.py" = ["T20"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
