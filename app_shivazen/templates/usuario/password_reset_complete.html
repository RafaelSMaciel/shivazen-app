<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Redefinida — {{ CLINIC_NAME }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f5;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            margin: 1rem;
        }

        .success-icon {
            width: 80px; height: 80px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: #2e7d32;
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }

        .card p {
            color: #999;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .login-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #C9A84C, #e8c94f);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Lato', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201,168,76,0.3);
        }

        @media (max-width: 768px) {
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h2>Senha redefinida!</h2>
        <p>Sua senha foi alterada com sucesso. Agora voce pode fazer login com sua nova senha.</p>
        <a href="{% url 'shivazen:usuario_login' %}" class="login-btn">
            <i class="fas fa-sign-in-alt"></i> Fazer login
        </a>
    </div>
</body>
</html>
