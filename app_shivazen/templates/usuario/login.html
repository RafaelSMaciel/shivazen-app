{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
    {% include 'partials/head.html' %}
    <style>
        body { background: var(--bg-cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 420px; padding: 0 20px; }
        .login-card {
            background: white; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md); padding: 2.5rem;
            border: 1px solid var(--border);
        }
        .login-input {
            width: 100%; padding: 14px 18px;
            border: 2px solid var(--border); border-radius: var(--radius-sm);
            font-size: 1rem; font-family: 'Lato', sans-serif;
            transition: all 0.3s; background: var(--bg-cream);
            color: var(--text-dark);
        }
        .login-input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(196, 163, 90, 0.15);
            background: white;
        }
        .login-input::placeholder { color: var(--text-light); }
    </style>
</head>
<body>
    <div class="login-container fade-in">
        <div class="text-center mb-4">
            <a href="{% url 'shivazen:inicio' %}">
                <img src="{% static 'assents/LogoCompletaSemFundo.png' %}" alt="Shiva Zen" style="max-height:60px;" class="mb-3">
            </a>
            <h1 class="h4 fw-bold" style="font-family:'Playfair Display',serif;color:var(--text-dark);">Painel Administrativo</h1>
            <p class="small text-muted">Acesse com suas credenciais</p>
        </div>

        <div class="login-card">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} small rounded-3 mb-3 py-2 px-3" style="border:none;{% if message.tags == 'error' %}background:#FEE2E2;color:#991B1B;{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'shivazen:usuarioLogin' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" style="font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Usuário</label>
                    <input type="text" name="username" class="login-input" placeholder="Seu nome de usuário" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label" style="font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Senha</label>
                    <input type="password" name="password" class="login-input" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" style="font-size:0.95rem;">
                    <i class="fas fa-sign-in-alt me-2"></i>Entrar
                </button>
            </form>
        </div>

        <p class="text-center mt-4 small text-muted">
            <a href="{% url 'shivazen:inicio' %}" style="color:var(--primary);font-weight:600;">← Voltar ao site</a>
        </p>
    </div>
</body>
</html>
