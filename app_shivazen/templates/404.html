{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada — {{ CLINIC_NAME }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f8f7f5 0%, #f0ebe3 100%);
            text-align: center;
            padding: 2rem;
        }
        .error-container { max-width: 500px; }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem; font-weight: 700;
            background: linear-gradient(135deg, #C9A84C, #e8c94f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1;
        }
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; color: #1a1a2e;
            margin: 1rem 0 0.5rem;
        }
        .error-text { color: #999; font-size: 0.95rem; margin-bottom: 2rem; }
        .error-btn {
            display: inline-block; padding: 0.875rem 2rem;
            background: linear-gradient(135deg, #C9A84C, #e8c94f);
            color: white; text-decoration: none; border-radius: 14px;
            font-weight: 700; transition: all 0.3s;
        }
        .error-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); color: white; }
        .error-links { margin-top: 1.5rem; }
        .error-links a { color: #C9A84C; text-decoration: none; font-size: 0.85rem; margin: 0 0.75rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Página não encontrada</h1>
        <p class="error-text">A página que você procura não existe ou foi movida. Que tal voltar para a página inicial?</p>
        <a href="/" class="error-btn">Voltar ao Início</a>
        <div class="error-links">
            <a href="/agendamento/">Agendar</a>
            <a href="/servicos/faciais/">Serviços</a>
            <a href="/contato/">Contato</a>
        </div>
    </div>
</body>
</html>
