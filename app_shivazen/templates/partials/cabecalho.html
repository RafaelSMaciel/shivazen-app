{% load static %}
<header id="header" class="header fixed-top">

  <div class="topbar d-flex align-items-center dark-background">
    <div class="container d-flex justify-content-center justify-content-md-between">
      <div class="contact-info d-flex align-items-center">
        <i class="bi bi-phone d-flex align-items-center"><span>{{ CLINIC_PHONE }}</span></i>
      </div>
      <div class="social-links d-none d-md-flex align-items-center">
        <a href="{{ INSTAGRAM_URL }}" target="_blank" rel="noopener" class="instagram" aria-label="Instagram"><i class="bi bi-instagram" aria-hidden="true"></i></a>
        <a href="https://wa.me/{{ WHATSAPP_NUMERO }}" target="_blank" rel="noopener" class="whatsapp" aria-label="WhatsApp"><i class="bi bi-whatsapp" aria-hidden="true"></i></a>
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Alternar tema claro/escuro" title="Alternar tema"><i class="bi bi-moon-stars" aria-hidden="true"></i></button>
      </div>
    </div>
  </div>

  <div class="branding d-flex align-items-center">
    <div class="container position-relative d-flex align-items-center justify-content-between">
      <a href="{% url 'shivazen:inicio' %}" class="logo d-flex align-items-center">
        <h1 class="sitename">{{ CLINIC_NAME }}</h1>
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="{% url 'shivazen:inicio' %}" class="{% if request.resolver_match.url_name == 'inicio' %}active{% endif %}">Home</a></li>
          <li><a href="{% url 'shivazen:quem_somos' %}" class="{% if request.resolver_match.url_name == 'quem_somos' %}active{% endif %}">Sobre</a></li>
          <li><a href="{% url 'shivazen:servicos_faciais' %}" class="{% if request.resolver_match.url_name == 'servicos_faciais' or request.resolver_match.url_name == 'servicos_corporais' %}active{% endif %}">Serviços</a></li>
          <li><a href="{% url 'shivazen:equipe' %}" class="{% if request.resolver_match.url_name == 'equipe' %}active{% endif %}">Profissionais</a></li>
          <li><a href="{% url 'shivazen:meus_agendamentos' %}" class="{% if request.resolver_match.url_name == 'meus_agendamentos' %}active{% endif %}"><i class="bi bi-calendar-heart me-1"></i>Meus Agendamentos</a></li>
          <li class="dropdown"><a href="#" class="{% if request.resolver_match.url_name in 'especialidades,depoimentos,galeria,promocoes,agenda_contato,termos_uso,politica_privacidade' %}active{% endif %}"><span>Mais</span> <i class="bi bi-chevron-down toggle-dropdown"></i></a>
            <ul>
              <li><a href="{% url 'shivazen:especialidades' %}" class="{% if request.resolver_match.url_name == 'especialidades' %}active{% endif %}">Especialidades</a></li>
              <li><a href="{% url 'shivazen:depoimentos' %}" class="{% if request.resolver_match.url_name == 'depoimentos' %}active{% endif %}">Depoimentos</a></li>
              <li><a href="{% url 'shivazen:galeria' %}" class="{% if request.resolver_match.url_name == 'galeria' %}active{% endif %}">Galeria</a></li>
              <li><a href="{% url 'shivazen:promocoes' %}" class="{% if request.resolver_match.url_name == 'promocoes' %}active{% endif %}">Promoções</a></li>
              <li><a href="{% url 'shivazen:agenda_contato' %}" class="{% if request.resolver_match.url_name == 'agenda_contato' %}active{% endif %}">Contato</a></li>
              <li><a href="{% url 'shivazen:termos_uso' %}" class="{% if request.resolver_match.url_name == 'termos_uso' %}active{% endif %}">Termos</a></li>
              <li><a href="{% url 'shivazen:politica_privacidade' %}" class="{% if request.resolver_match.url_name == 'politica_privacidade' %}active{% endif %}">Privacidade</a></li>
            </ul>
          </li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

      <a href="{% url 'shivazen:agendamento_publico' %}" class="btn-agendar-cta d-none d-lg-inline-flex align-items-center" aria-label="Agendar consulta">
        <i class="bi bi-calendar-plus me-2" aria-hidden="true"></i>Agendar
      </a>
    </div>
  </div>
</header>
