{% load static %}
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block titulo %}Shiva Zen — Estética Avançada{% endblock %}</title>

<!-- SEO -->
<meta name="description" content="Shiva Zen — Clínica de estética avançada em São José do Rio Preto. Tratamentos faciais e corporais com biomédica especialista. Agende sua consulta!">
<meta name="keywords" content="estética, clínica, São José do Rio Preto, tratamento facial, corporal, biomédica, harmonização, peeling, bioestimulador">
<meta name="author" content="Shiva Zen">
<meta name="robots" content="index, follow">

<!-- Open Graph -->
<meta property="og:title" content="Shiva Zen — Clínica de Estética Avançada">
<meta property="og:description" content="Tratamentos faciais e corporais com biomédica especialista em São José do Rio Preto.">
<meta property="og:type" content="website">
<meta property="og:image" content="{% static 'assents/LogoCompleta.png' %}">
<meta property="og:locale" content="pt_BR">

<!-- Favicon -->
<link rel="icon" type="image/png" href="{% static 'assents/LogoSemFundo.png' %}">

<!-- Google Fonts (Roboto, Montserrat, Lato) -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Lato:wght@100;300;400;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Vendor CSS (Template) -->
<link href="{% static 'vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
<link href="{% static 'vendor/aos/aos.css' %}" rel="stylesheet">
<link href="{% static 'vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
<link href="{% static 'vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/base.css' %}?v=3.0">
<link rel="stylesheet" href="{% static 'css/template.css' %}?v=1.0">
