{% load static %}
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>{% block titulo %}{{ CLINIC_NAME }} — {{ CLINIC_SUBTITLE }}{% endblock %}</title>
<meta name="description" content="{% block meta_description %}Clínica de estética especializada em tratamentos faciais e corporais. Agendamento online, prontuário eletrônico e profissionais especializados.{% endblock %}">
<meta name="keywords" content="estética, tratamentos faciais, tratamentos corporais, agendamento online, clínica de estética, {{ CLINIC_NAME }}">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="{{ CLINIC_NAME }} — {{ CLINIC_SUBTITLE }}">
<meta property="og:description" content="Tratamentos estéticos faciais e corporais com tecnologia avançada e atendimento humanizado. Agende online.">
<meta property="og:url" content="{{ SITE_URL }}">
<meta property="og:image" content="{{ SITE_URL }}{% static 'assets/health/staff-10.webp' %}">
<meta property="og:locale" content="pt_BR">

<!-- Favicons -->
<link href="{% static 'assets/favicon.png' %}" rel="icon">
<link href="{% static 'assets/apple-touch-icon.png' %}" rel="apple-touch-icon">

<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;500;600;700;800&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

<!-- Vendor CSS Files -->
<link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
<link href="{% static 'vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
<link href="{% static 'vendor/aos/aos.css' %}" rel="stylesheet">
<link href="{% static 'vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
<link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
<link href="{% static 'vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">

<!-- Main Stylesheet -->
<link href="{% static 'css/main.css' %}" rel="stylesheet">
