{% load static %}
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>{% block titulo %}{{ CLINIC_NAME }} - Clínica de Estética{% endblock %}</title>
<meta name="description" content="{% block meta_description %}Clínica de estética especializada em tratamentos faciais e corporais. Agendamento online, prontuário eletrônico e profissionais especializados.{% endblock %}">
<meta name="keywords" content="estética, tratamentos faciais, tratamentos corporais, agendamento online, clínica de estética, {{ CLINIC_NAME }}">

<!-- Favicons -->
<link href="{% static 'assets/LogoSemFundo.png' %}" rel="icon">
